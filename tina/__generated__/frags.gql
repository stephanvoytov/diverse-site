fragment AboutParts on About {
  __typename
  ... on AboutAboutHero {
    heroEyebrow
    heroHeading
    heroDesc
  }
  ... on AboutAboutStats {
    stats {
      __typename
      num
      suffix
      label
      accent
    }
  }
  ... on AboutAboutPhilosophy {
    philosophyEyebrow
    philosophyHeading
    philosophyBody1
    philosophyBody2
  }
  ... on AboutAboutAdvantages {
    advantagesEyebrow
    advantagesHeading
    advantages {
      __typename
      title
      desc
    }
  }
  ... on AboutAboutTimeline {
    timelineEyebrow
    timelineHeading
    milestones {
      __typename
      year
      title
      desc
    }
  }
  ... on AboutAboutRepresentative {
    repEyebrow
    repHeading
    repBody
    repInn
    repAddress
  }
  ... on AboutAboutCta {
    ctaHeading
    ctaButton
  }
}

