  ... on HomeHomeStores {
    eyebrow
    heading
    desc
    ghost {
      __typename
      label
      tooltip
      sidebarYourCity
      sidebarCTA
      sidebarSubtext
    }
  }
  ... on HomeHomeKpRating {
    eyebrow
    headingAccent
    headingAfter
    desc
    badge {
