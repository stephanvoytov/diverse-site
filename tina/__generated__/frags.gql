    eyebrow
    headingBefore
    headingAccent
    desc
  }
  ... on HomeHomeRoadmap {
    eyebrow
    headingBefore
    headingAccent
    desc
  }
  ... on HomeHomeCaseStudies {
    eyebrow
    headingBefore
    headingAccent
    desc
    caseLabels {
      __typename
      payback
      profitMonth
      investment
      video
      photo
    }
    openedPrefix
    openedSuffix
  }
  ... on HomeHomeFaq {
    eyebrow
    headingBefore
    headingAccent
    desc
  }
  ... on HomeHomeContacts {
    eyebrow
    heading
    desc
    form {
      __typename
      name
      namePlaceholder
      phone
      phonePlaceholder
      format
      formatPlaceholder
      message
      messagePlaceholder
      submit
      submitting
